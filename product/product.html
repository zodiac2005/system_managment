<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Management</title>
    <link rel="stylesheet" href="product.css">
</head>
<body>
    <main class="product-main">
        <h1 class="page-title">Product Management</h1>
        <form action="" method="post" id="product-form">
            <label for="product-name">Product Name:</label>
        <input type="text" id="type_product" name="type_product">
        <label for="prix_achat">Price of buying:</label>
        <input type="number" id="prix_achat" name="prix_achat">
        <label for="prix_vente">Price of selling:</label>
        <input type="number" id="prix_vente" name="prix_vente" >
        <button type="submit">Add Product</button>
        <button type="button" id="Edit-product">Edit Product</button>
    </form>
</body>
<script src="product.js"></script>
</html>
