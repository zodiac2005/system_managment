<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Management</title>
    <!-- <link rel="stylesheet" href="product.css"> -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <main class="product-main container mt-5">
        <h1 class="page-title mb-4">Product Management</h1>
        <form action="" method="post" id="product-form" class="shadow p-4 bg-white rounded">
            <div class="mb-3">
                <label for="reference_product" class="form-label">Reference Product :</label>
                <input type="text" id="reference_product" name="reference_product" class="form-control"> 
            </div>

            <div class="mb-3">
                <label for="type_product" class="form-label">Product Name:</label>
                <input type="text" id="type_product" name="type_product" class="form-control">
            </div>

            <div class="mb-3">
                <label for="prix_achat" class="form-label">Price of buying:</label>
                <input type="number" id="prix_achat" name="prix_achat" class="form-control">
            </div>

            <div class="mb-3">
                <label for="prix_vente" class="form-label">Price of selling:</label>
                <input type="number" id="prix_vente" name="prix_vente" class="form-control">
            </div>

            <button type="submit" class="btn btn-success">Add Product</button>
            <button type="button" id="Edit_product" class="btn btn-primary">Edit Product</button>
        </form>
    </main>

    <div class="modal fade" id="editProductModal" tabindex="-1" aria-labelledby="editProductModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="editProductModalLabel">Edit Product</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="productSelect" class="form-label">Select Product Reference:</label>
                        <select id="productSelect" class="form-select">
                            <option value="">-- Choose Reference --</option>
                        </select>
                    </div>
                    <hr>
                    <div class="mb-3">
                        <label for="edit_type_product" class="form-label">New Product Name:</label>
                        <input type="text" id="edit_type_product" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label for="edit_prix_achat" class="form-label">New Price of buying:</label>
                        <input type="number" id="edit_prix_achat" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label for="edit_prix_vente" class="form-label">New Price of selling:</label>
                        <input type="number" id="edit_prix_vente" class="form-control">
                    </div>
                </div>
              <div class="modal-footer">
    <button type="button" class="btn btn-danger me-auto" onclick="deleteProduct()">Delete Product</button>
    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
    <button type="button" class="btn btn-warning" onclick="saveProductUpdate()">Save Changes</button>
</div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="product.js"></script>
</body>
</html>
